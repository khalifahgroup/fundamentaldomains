<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimal HKL selector</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            border-bottom: 2px solid #eaeded;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            background-color: #fff;
        }

        .miller-indices {
            display: flex;
            gap: 15px;
        }

        .index-field {
            flex: 1;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #e8f4f8;
            border-left: 4px solid var(--accent);
            display: none;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Optimal HKL selector</h2>
    <form id="crystalForm" onsubmit="handleSubmit(event)">
        
        <!-- 32 Point Groups Dropdown grouped by Crystal System -->
        <div class="form-group">
            <label for="pointGroup">Laue class:</label>
            <select id="pointGroup" required>
                <option value="" disabled selected>-- Select Laue class --</option>
                
                <optgroup label="Triclinic">
                    <option value="-1">-1</option>
                </optgroup>
                
                <optgroup label="Monoclinic">
                    <option value="2/m">2/m</option>
                </optgroup>
                
                <optgroup label="Orthorhombic">
                    <option value="mmm">mmm</option>
                </optgroup>
                
                <optgroup label="Tetragonal">
                    <option value="4/m">4/m</option>
                    <option value="4/mmm">4/mmm</option>
                </optgroup>
                
                <optgroup label="Trigonal">
                    <option value="-3">-3</option>
                    <option value="-3m">-3m</option>
                </optgroup>
                
                <optgroup label="Hexagonal">
                    <option value="6/m">6/m</option>
                    <option value="6/mmm">6/mmm</option>
                </optgroup>
                
                <optgroup label="Cubic">
                    <option value="m-3">m-3</option>
                    <option value="m-3m">m-3m</option>
                </optgroup>
            </select>
        </div>

        <!-- H, K, L Miller Indices Textboxes -->
        <div class="form-group">
            <label>Miller Indices (h, k, l):</label>
            <div class="miller-indices">
                <div class="index-field">
                    <input type="number" id="hIndex" placeholder="H" required>
                </div>
                <div class="index-field">
                    <input type="number" id="kIndex" placeholder="K" required>
                </div>
                <div class="index-field">
                    <input type="number" id="lIndex" placeholder="L" required>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit">Get best HKL</button>
    </form>

    <!-- Visual Output Area -->
    <div id="output"></div>
</div>

<script>
// ---------------------------------------------
// 11 Laue classes and their symmetry operators
// Each operator is a triple of expressions in h,k,l
// ---------------------------------------------
const LAUE_OPERATORS = {
  "-1": [
    ["h", "k", "l"],
    ["-h", "-k", "-l"]
  ],

  "2/m": [
    ["h", "k", "l"],
    ["-h", "-k", "l"],
    ["h", "-k", "-l"],
    ["-h", "k", "-l"]
  ],

  "mmm": [
    ["h", "k", "l"],
    ["-h", "k", "l"],
    ["h", "-k", "l"],
    ["h", "k", "-l"],
    ["-h", "-k", "l"],
    ["-h", "k", "-l"],
    ["h", "-k", "-l"],
    ["-h", "-k", "-l"]
  ],

  "4/m": [
    ["h", "k", "l"],
    ["-k", "h", "l"],
    ["-h", "-k", "l"],
    ["k", "-h", "l"],
    ["h", "k", "-l"],
    ["-k", "h", "-l"],
    ["-h", "-k", "-l"],
    ["k", "-h", "-l"]
  ],

  "4/mmm": [
    ["h", "k", "l"],
    ["-k", "h", "l"],
    ["-h", "-k", "l"],
    ["k", "-h", "l"],
    ["h", "k", "-l"],
    ["-k", "h", "-l"],
    ["-h", "-k", "-l"],
    ["k", "-h", "-l"],
    ["k", "h", "l"],
    ["-h", "k", "l"],
    ["-k", "-h", "l"],
    ["h", "-k", "l"],
    ["k", "h", "-l"],
    ["-h", "k", "-l"],
    ["-k", "-h", "-l"],
    ["h", "-k", "-l"]
  ],

  "-3": [
    ["h", "k", "l"],
    ["k", "l", "h"],
    ["l", "h", "k"],
    ["-h", "-k", "-l"],
    ["-k", "-l", "-h"],
    ["-l", "-h", "-k"]
  ],

  "-3m": [
    ["h", "k", "l"],
    ["k", "l", "h"],
    ["l", "h", "k"],
    ["-h", "-k", "l"],
    ["-k", "-l", "h"],
    ["-l", "-h", "k"],
    ["h", "k", "-l"],
    ["k", "l", "-h"],
    ["l", "h", "-k"],
    ["-h", "-k", "-l"],
    ["-k", "-l", "-h"],
    ["-l", "-h", "-k"]
  ],

  "6/m": [
    ["h", "k", "l"],
    ["-k", "h+k", "l"],
    ["-h-k", "h", "l"],
    ["-h", "-k", "l"],
    ["k", "-h-k", "l"],
    ["h+k", "-h", "l"],
    ["h", "k", "-l"],
    ["-k", "h+k", "-l"],
    ["-h-k", "h", "-l"],
    ["-h", "-k", "-l"],
    ["k", "-h-k", "-l"],
    ["h+k", "-h", "-l"]
  ],

  "6/mmm": [
    ["h", "k", "l"],
    ["-k", "h+k", "l"],
    ["-h-k", "h", "l"],
    ["-h", "-k", "l"],
    ["k", "-h-k", "l"],
    ["h+k", "-h", "l"],
    ["h", "k", "-l"],
    ["-k", "h+k", "-l"],
    ["-h-k", "h", "-l"],
    ["-h", "-k", "-l"],
    ["k", "-h-k", "-l"],
    ["h+k", "-h", "-l"]
  ],

  "m-3": [
    ["h", "k", "l"],
    ["h", "l", "k"],
    ["k", "h", "l"],
    ["k", "l", "h"],
    ["l", "h", "k"],
    ["l", "k", "h"],
    ["-h", "-k", "l"],
    ["-h", "-l", "k"],
    ["-k", "-h", "l"],
    ["-k", "-l", "h"],
    ["-l", "-h", "k"],
    ["-l", "-k", "h"]
  ],

  "m-3m": [
    ["h", "k", "l"],
    ["h", "l", "k"],
    ["k", "h", "l"],
    ["k", "l", "h"],
    ["l", "h", "k"],
    ["l", "k", "h"],
    ["-h", "-k", "l"],
    ["-h", "-l", "k"],
    ["-k", "-h", "l"],
    ["-k", "-l", "h"],
    ["-l", "-h", "k"],
    ["-l", "-k", "h"],
    ["h", "k", "-l"],
    ["h", "l", "-k"],
    ["k", "h", "-l"],
    ["k", "l", "-h"],
    ["l", "h", "-k"],
    ["l", "k", "-h"],
    ["-h", "-k", "-l"],
    ["-h", "-l", "-k"],
    ["-k", "-h", "-l"],
    ["-k", "-l", "-h"],
    ["-l", "-h", "-k"],
    ["-l", "-k", "-h"]
  ]
};

// ---------------------------------------------
// Safe arithmetic evaluator for expressions like "h+k", "-h", "h-k+l"
// ---------------------------------------------
function evalExpr(expr, h, k, l) {
  return Function("h", "k", "l", `"use strict"; return (${expr});`)(h, k, l);
}

// ---------------------------------------------
// Main function: return symmetry-equivalent HKLs
// ---------------------------------------------
function getSymmetryEquivalents(laueClass, h, k, l) {
  const ops = LAUE_OPERATORS[laueClass];
  if (!ops) throw new Error(`Unknown Laue class: ${laueClass}`);

  const results = [];

  for (const op of ops) {
    const h2 = evalExpr(op[0], h, k, l);
    const k2 = evalExpr(op[1], h, k, l);
    const l2 = evalExpr(op[2], h, k, l);

    const triplet = [h2, k2, l2];
    const key = triplet.toString();

    if (!results.some(x => x.toString() === key)) {
      results.push(triplet);
    }
  }

  return results;
}

function generateHKLs(point_group, h, k, l, fpairs) {
  const equiv_hkls = [];
  const allhkls = [];

  const isZero = x => x === 0;

  for (const base_hkl in point_group) {
    const cond =
      (
        (isZero(h) === (base_hkl[0] === "0")) &&
        (isZero(k) === (base_hkl[1] === "0")) &&
        (isZero(l) === (base_hkl[2] === "0"))
      ) ||
      base_hkl === "hkl";

    if (cond) {
      for (const equiv of point_group[base_hkl]) {
        const equiv_hkl = [0, 0, 0];

        for (let i = 0; i < 3; i++) {
          let expression = equiv[i]
            .replace(/h/g, h.toString())
            .replace(/k/g, k.toString())
            .replace(/l/g, l.toString());

          // Safe arithmetic evaluation
          equiv_hkl[i] = Function(`"use strict"; return (${expression});`)();
        }

        equiv_hkls.push(equiv_hkl);

        if (fpairs) {
          equiv_hkls.push(equiv_hkl.map(v => -v));
        }
      }
    }
  }

  // Deduplicate
  for (const equiv of equiv_hkls) {
    const key = equiv.toString();
    if (!allhkls.some(x => x.toString() === key)) {
      allhkls.push(equiv);
    }
  }

  return allhkls;
}


	
    function handleSubmit(event) {
        // Prevent page from refreshing on form submission
        event.preventDefault();

        // Get values from the inputs
        const pointGroup = document.getElementById('pointGroup').value;
        const h = document.getElementById('hIndex').value;
        const k = document.getElementById('kIndex').value;
        const l = document.getElementById('lIndex').value;

		if (pointGroup == "-1"): {
			const json_obj = {
			  "hkl": [
				[
				  "h",
				  " k",
				  " l"
				]
			  ],
			  "hk0": [
				[
				  "h",
				  " k",
				  " 0"
				]
			  ],
			  "h0l": [
				[
				  "h",
				  " 0",
				  " l"
				]
			  ],
			  "0kl": [
				[
				  "0",
				  " k",
				  " l"
				]
			  ],
			  "h00": [
				[
				  "h",
				  " 0",
				  " 0"
				]
			  ],
			  "0k0": [
				[
				  "0",
				  " k",
				  " 0"
				]
			  ],
			  "00l": [
				[
				  "0",
				  " 0",
				  " l"
				]
			  ]
			};
		}
		
		allhkls = getSymmetryEquivalents(pointGroup, h, k, l)

        // Display the results dynamically
        const outputDiv = document.getElementById('output');
        outputDiv.style.display = 'block';
        outputDiv.innerHTML = `
            <strong>Submission Received:</strong><br>
            • Point Group: <strong>${pointGroup}</strong><br>
            • Miller Indices: <strong>(${h} ${k} ${l})</strong>
            • Equivalent HKLs: <strong>(${allhkls})</strong>
        `;
    }
</script>

</body>
</html>
