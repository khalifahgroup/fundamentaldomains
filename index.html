<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimal HKL selector</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            border-bottom: 2px solid #eaeded;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            background-color: #fff;
        }

        .miller-indices {
            display: flex;
            gap: 15px;
        }

        .index-field {
            flex: 1;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #e8f4f8;
            border-left: 4px solid var(--accent);
            display: none;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Optimal HKL selector</h2>
    <form id="crystalForm" onsubmit="handleSubmit(event)">
        
        <!-- 32 Point Groups Dropdown grouped by Crystal System -->
        <div class="form-group">
            <label for="pointGroup">Laue class:</label>
            <select id="pointGroup" required>
                <option value="" disabled selected>-- Select Laue class --</option>
                
                <optgroup label="Triclinic">
                    <option value="-1">-1 (Ci)</option>
                </optgroup>
                
                <optgroup label="Monoclinic">
                    <option value="2/m">2/m (C2h)</option>
                </optgroup>
                
                <optgroup label="Orthorhombic">
                    <option value="mmm">mmm (D2h / Vh)</option>
                </optgroup>
                
                <optgroup label="Tetragonal">
                    <option value="4/m">4/m (C4h)</option>
                    <option value="4/mmm">4/mmm (D4h)</option>
                </optgroup>
                
                <optgroup label="Trigonal">
                    <option value="-3">-3 (C3i / S6)</option>
                    <option value="-3m">-3m (D3d)</option>
                </optgroup>
                
                <optgroup label="Hexagonal">
                    <option value="6/m">6/m (C6h)</option>
                    <option value="6/mmm">6/mmm (D6h)</option>
                </optgroup>
                
                <optgroup label="Cubic">
                    <option value="m-3">m-3 (Th)</option>
                    <option value="m-3m">m-3m (Oh)</option>
                </optgroup>
            </select>
        </div>

        <!-- H, K, L Miller Indices Textboxes -->
        <div class="form-group">
            <label>Miller Indices (h, k, l):</label>
            <div class="miller-indices">
                <div class="index-field">
                    <input type="number" id="hIndex" placeholder="H" required>
                </div>
                <div class="index-field">
                    <input type="number" id="kIndex" placeholder="K" required>
                </div>
                <div class="index-field">
                    <input type="number" id="lIndex" placeholder="L" required>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit">Get best HKL</button>
    </form>

    <!-- Visual Output Area -->
    <div id="output"></div>
</div>

<script>
    function handleSubmit(event) {
        // Prevent page from refreshing on form submission
        event.preventDefault();

        // Get values from the inputs
        const pointGroup = document.getElementById('pointGroup').value;
        const h = document.getElementById('hIndex').value;
        const k = document.getElementById('kIndex').value;
        const l = document.getElementById('lIndex').value;

        if (pointGroup == "-1"){
            const allhkls ="test";
        }

        // Display the results dynamically
        const outputDiv = document.getElementById('output');
        outputDiv.style.display = 'block';
        outputDiv.innerHTML = `
            • Point Group: <strong>${pointGroup}</strong><br>
            • Miller Indices: <strong>(${allhkls})</strong>
        `;
    }
</script>

</body>
</html>
